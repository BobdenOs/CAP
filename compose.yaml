services:

  cap:
    image: "node:lts"
    user: "node"
    working_dir: /home/node/app
    environment:
      - PORT=443
      - NODE_ENV=production
      - NODE_EXTRA_CA_CERTS=/home/node/app/ssl/ca/ca.crt
    volumes:
      - ./:/home/node/app
      - ./ssl/servers/cap.crt:/home/node/app/server.crt
      - ./ssl/servers/cap.key:/home/node/app/server.key
    ports:
      - "9000:9229"
    networks:
      cap_network:
        ipv4_address: 192.168.2.10
    command: ["npm", "run", "debug"]

  sap.cap:
    image: "node:lts"
    user: "node"
    working_dir: /home/node/app
    environment:
      - PORT=443
      - NODE_ENV=production
      - NODE_EXTRA_CA_CERTS=/home/node/app/ssl/ca/ca.crt
    volumes:
      - ./:/home/node/app
      - ./ssl/servers/sap.cap.crt:/home/node/app/server.crt
      - ./ssl/servers/sap.cap.key:/home/node/app/server.key
    ports:
      - "9001:9229"
    networks:
      cap_network:
        ipv4_address: 192.168.2.11
    command: ["npm", "run", "debug"]

  dev.sap.cap:
    image: "node:lts"
    user: "node"
    working_dir: /home/node/app
    environment:
      - PORT=443
      - NODE_ENV=production
      - NODE_EXTRA_CA_CERTS=/home/node/app/ssl/ca/ca.crt
    volumes:
      - ./:/home/node/app
      - ./ssl/servers/dev.sap.cap.crt:/home/node/app/server.crt
      - ./ssl/servers/dev.sap.cap.key:/home/node/app/server.key
    ports:
      - "53:5353/udp"
      - "443:443"
      - "9002:9229"
    networks:
      cap_network:
        ipv4_address: 192.168.2.12
    command: ["npm", "run", "debug"]

networks:
  cap_network:
    driver: bridge
    enable_ipv6: false
    ipam:
      driver: default
      config:
        - subnet: 192.168.2.0/24
          gateway: 192.168.2.1

